server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unknown routes serve the React app
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
