apiVersion: apps/v1
kind: Deployment
metadata:
  name:  sandbox-deployment
  labels:
    name:  sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: resource-manager
      volumes:
        # Same node-local store the sync-agent uses, so we can delete a
        # project's persisted files when the project is deleted.
        - name: persist-volume
          hostPath:
            path: /mnt/sandbox-data
            type: DirectoryOrCreate
      containers:
      - image:  sandbox
        imagePullPolicy: IfNotPresent
        name:  main-sandbox-container
        volumeMounts:
          - name: persist-volume
            mountPath: /persist
        resources:
          limits:
            cpu: "500m"
            memory: "400Mi"
          requests:
            cpu: "250m"
            memory: "200Mi"
        livenessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                name: database
                key: REDIS_URL
                
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: jwt
                key: JWT_SECRET
                
          - name: MONGO_URI
            valueFrom:
              secretKeyRef:
                name: database
                key: SANDBOX
        readinessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10      
        ports:
        - containerPort:  3000
          name:  main-sandbox
      