apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-deployment
  labels:
    name: sandbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: resource-manager
      volumes:
        # Same node-local store the sync-agent uses, so we can delete a
        # project's persisted files when the project is deleted.
        - name: persist-volume
          hostPath:
            path: /mnt/sandbox-data
            type: DirectoryOrCreate
      containers:
      - image: sandbox
        imagePullPolicy: Never
        name: main-sandbox-container
        volumeMounts:
          - name: persist-volume
            mountPath: /persist
        resources:
          requests:
            cpu: "250m"
            memory: "200Mi"
          limits:
            cpu: "500m"
            memory: "400Mi"
        livenessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/sandbox/health
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
        - name: PUBLIC_BASE_HOST
          value: "__BASE_HOST__"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: forge-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: forge-secrets
              key: JWT_SECRET
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: forge-secrets
              key: SANDBOX_MONGO_URI
        ports:
        - containerPort: 3000
          name: main-sandbox
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-service
spec:
  selector:
    app: sandbox
  type: ClusterIP
  ports:
  - name: main-sandbox-port
    port: 80
    targetPort: 3000
